{% extends "base.html" %}

{% block title %}TechCore | Nova Reserva{% endblock %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-md-6 col-lg-5">
        <div class="card p-4">
            
            <div class="text-center mb-4">
                <div class="rounded-circle bg-primary text-white d-inline-flex align-items-center justify-content-center mb-3" style="width: 60px; height: 60px;">
                    <i class="fas fa-calendar-plus fa-lg"></i>
                </div>
                <h3 class="fw-bold text-dark">Marcar Reserva</h3>
                <p class="text-muted small">Selecione um dos recursos disponíveis na TechCore</p>
            </div>

            {% if erro %}
            <div class="alert alert-danger alert-dismissible fade show border-0 shadow-sm mb-4" role="alert">
                <div class="d-flex align-items-center">
                    <i class="fas fa-exclamation-triangle me-2"></i>
                    <div><strong>Erro:</strong> {{ erro }}</div>
                </div>
                <button type="button" class="btn-close" data-bs-dismiss="alert" aria-label="Close"></button>
            </div>
            {% endif %}

            <form action="{{ url_for('criar_reserva') }}" method="POST">
                <div class="mb-3">
                    <label class="form-label fw-bold text-secondary">Recurso Disponível</label>
                    <div class="input-group">
                        <span class="input-group-text bg-white border-end-0"><i class="fas fa-box text-muted"></i></span>
                        <select name="recurso_id" class="form-select border-start-0 shadow-sm" required>
                            <option value="" disabled selected>Selecione um recurso...</option>
                            
                            {% for recurso in recursos %}
                                <option value="{{ recurso.id }}">{{ recurso.nome }}</option>
                            {% endfor %}
                            
                        </select>
                    </div>
                </div>

                <div class="row">
                    <div class="col-md-6 mb-3">
                        <label class="form-label fw-bold text-secondary">Data</label>
                        <input type="date" name="data" class="form-control shadow-sm" required>
                    </div>
                    <div class="col-md-6 mb-3">
                        <label class="form-label fw-bold text-secondary">Hora</label>
                        <input type="time" name="hora" class="form-control shadow-sm" required>
                    </div>
                </div>

                <div class="d-grid gap-2 mt-4">
                    <button type="submit" class="btn btn-primary btn-lg rounded-pill fw-bold shadow-sm">
                        <i class="fas fa-check-circle me-2"></i>Confirmar Agendamento
                    </button>
                    <a href="{{ url_for('listar_reservas') }}" class="btn btn-outline-secondary btn-lg rounded-pill fw-bold border-0">
                        Cancelar
                    </a>
                </div>
            </form>
        </div>

        <div class="text-center mt-3">
            <p class="text-muted small">
                <i class="fas fa-database me-1"></i> 
                Dados carregados do ficheiro <strong>database.db</strong>.
            </p>
        </div>
    </div>
</div>
{% endblock %}
